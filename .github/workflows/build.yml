name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # ===== Release 签名打包 =====
    # 需要在 GitHub Settings -> Secrets 中配置：
    # KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
    - name: Decode and convert Keystore
      if: ${{ github.event_name != 'pull_request' && env.HAS_SECRETS == 'true' }}
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > signing-key.jks
        keytool -importkeystore \
          -srckeystore signing-key.jks -srcstoretype JKS \
          -srcstorepass "${{ secrets.STORE_PASSWORD }}" \
          -destkeystore signing-key.p12 -deststoretype PKCS12 \
          -deststorepass "${{ secrets.STORE_PASSWORD }}" \
          -noprompt
      env:
        HAS_SECRETS: ${{ secrets.KEYSTORE_BASE64 != '' }}

    - name: Build Release APK
      if: ${{ github.event_name != 'pull_request' && env.HAS_SECRETS == 'true' }}
      run: ./gradlew assembleRelease
      env:
        CI: true
        HAS_SECRETS: ${{ secrets.KEYSTORE_BASE64 != '' }}
        KEYSTORE_FILE: ${{ github.workspace }}/signing-key.p12
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload Release APK
      if: ${{ github.event_name != 'pull_request' && env.HAS_SECRETS == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
      env:
        HAS_SECRETS: ${{ secrets.KEYSTORE_BASE64 != '' }}
